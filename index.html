function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function uid(){return Math.random().toString(36).slice(2,9);}
const _mem={};
const store={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):_mem[k]??null;}catch(e){return _mem[k]??null;}},
  set(k,v){_mem[k]=v;try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};

// ═══ 効果音（WebAudio合成） ═══
let AC=null;
function sfx(type){try{
  AC=AC||new(window.AudioContext||window.webkitAudioContext)();
  if(AC.state==="suspended")AC.resume();
  const t=AC.currentTime;
  const play=(f0,f1,dur,wave,vol,delay=0)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=wave;o.frequency.setValueAtTime(f0,t+delay);
    o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+delay+dur);
    g.gain.setValueAtTime(vol,t+delay);g.gain.exponentialRampToValueAtTime(.001,t+delay+dur);
    o.start(t+delay);o.stop(t+delay+dur);};
  if(type==="atk")play(500,180,.09,"square",.05);
  else if(type==="hit"){play(160,60,.15,"sawtooth",.06);}
  else if(type==="def")play(300,600,.08,"sine",.045);
  else if(type==="heal")play(520,880,.14,"sine",.05);
  else if(type==="click")play(900,700,.04,"sine",.03);
  else if(type==="win"){play(523,523,.1,"triangle",.05);play(659,659,.1,"triangle",.05,.1);play(784,784,.18,"triangle",.06,.2);}
  else if(type==="lose"){play(220,110,.3,"sawtooth",.05);play(165,82,.4,"sawtooth",.05,.15);}
  else if(type==="phase"){play(100,400,.3,"sawtooth",.06);}
  else if(type==="doom"){play(80,40,.6,"sawtooth",.08);}
}catch(e){}}

// ═══ ダメージ計算 ═══
function hasR(s,id){return s.run.relics.some(r=>r.id===id);}
function dmgE(s,idx,base,isAtk=true){
  const e=s.enemies[idx];if(!e||e.hp<=0)return 0;
  let d=Math.max(0,base+(s.run.str||0));
  if(s.run.weakened>0)d=Math.floor(d*.75);
  if(isAtk){
    if(hasR(s,"rusty"))d+=2;
    if(hasR(s,"ragemask")&&s.run.hp<=s.run.maxHp*.4)d=Math.floor(d*1.5);
  }
  if(e.shield>=d)e.shield-=d;else{e.hp-=d-e.shield;e.shield=0;}
  if(isAtk&&hasR(s,"poisonring"))e.poison=(e.poison||0)+1;
  addPop(s,idx,`-${d}`,"#ff5252");
  return d;
}
function dmgP(s,d,src){
  if(s.run.shield>=d)s.run.shield-=d;else{s.run.hp-=d-s.run.shield;s.run.shield=0;}
  addPop(s,"p",`-${d}`,"#ff5252");
  s.shakeOn=true;
}
function addPop(s,target,txt,color){
  const id=uid();s.pops.push({id,target,txt,color});
  setTimeout(()=>{const g=s;g.pops=g.pops.filter(p=>p.id!==id);g._rr&&g._rr();},900);
}
function draw(s,n){
  for(let i=0;i<n;i++){
    if(!s.battle.drawPile.length){s.battle.drawPile=shuffle(s.battle.discardPile);s.battle.discardPile=[];}
    if(s.battle.drawPile.length)s.battle.hand.push(s.battle.drawPile.pop());
  }
}

  reckless:s=>{dmgE(s,s.ti,30);s.run.hp-=8;addPop(s,"p","-8","#ff8a65");},
  poison:s=>{dmgE(s,s.ti,6);const e=s.enemies[s.ti];if(e)e.poison=(e.poison||0)+3;},
  thunder:s=>{const n=Math.random()<.5?2:1;for(let i=0;i<n;i++)dmgE(s,s.ti,14);},
  wall:s=>{s.run.shield+=8;addPop(s,"p","+8🛡️","#4fc3f7");},"wall+":s=>{s.run.shield+=12;addPop(s,"p","+12🛡️","#4fc3f7");},
  barrier:s=>{s.run.shield+=16;addPop(s,"p","+16🛡️","#4fc3f7");},
  counter:s=>{s.run.shield+=5;s.run.counter=8;s.log.push("🔄 カウンター構え！");},
  fortress:s=>{s.run.shield+=30;addPop(s,"p","+30🛡️","#4fc3f7");},
  thorns:s=>{s.run.shield+=4;s.run.thorns=3;},
  heal:s=>{s.run.hp=Math.min(s.run.hp+12,s.run.maxHp);addPop(s,"p","+12❤️","#66bb6a");},
  "heal+":s=>{s.run.hp=Math.min(s.run.hp+18,s.run.maxHp);addPop(s,"p","+18❤️","#66bb6a");},
  drain:s=>{dmgE(s,s.ti,10);s.run.hp=Math.min(s.run.hp+6,s.run.maxHp);addPop(s,"p","+6❤️","#66bb6a");},
  rage:s=>{s.run.str+=2;addPop(s,"p","💪+2","#ffd54f");},
  accel:s=>{s.battle.energy+=1;draw(s,1);},
  cleanse:s=>{s.run.poison=0;s.run.burn=0;s.run.weakened=0;const ci=s.battle.hand.findIndex(c=>c.type==="curse");if(ci>=0)s.battle.hand.splice(ci,1);addPop(s,"p","✨浄化","#ba68c8");},
  scout:s=>draw(s,2),
};

function mc(id){const m=CM[id];if(!m)return null;return{...m,id,uid:uid(),enhanced:false};}
function enhance(c){if(c.enhanced||!c.up)return false;c.enhanced=true;c.desc=c.up;c.name+="＋";c.id=c.upId||c.id;return true;}
function rollReward(){
  const pool=Object.keys(CM).filter(k=>CM[k].r!=="x"&&k!=="slash"&&k!=="wall"&&k!=="heal");
  const w=pool.map(k=>CM[k].r==="r"?12:CM[k].r==="u"?35:53);
  const res=[];const used=new Set();
  while(res.length<3&&used.size<pool.length){
    let tot=0;for(let i=0;i<pool.length;i++)if(!used.has(i))tot+=w[i];
    let r=Math.random()*tot;
    for(let i=0;i<pool.length;i++){if(used.has(i))continue;r-=w[i];if(r<=0){used.add(i);res.push(mc(pool[i]));break;}}
  }
  return res;
}

function genMap(stage){
  const rows=stage===1?7:stage===2?8:9;const map=[];const pool=SP[stage];
  for(let i=0;i<rows;i++){
    if(i===rows-1){map.push([{type:"boss",id:SB[stage]}]);continue;}
    if(i===0){map.push([{type:"battle",enemyPool:pool}]);continue;}
    const nodes=[];const cnt=2+Math.floor(Math.random()*2);
    for(let j=0;j<cnt;j++){const r=Math.random();
      if(r<.30)nodes.push({type:"battle",enemyPool:pool});
      else if(r<.44)nodes.push({type:"elite",id:SE[stage]});
      else if(r<.58)nodes.push({type:"event"});
      else if(r<.72)nodes.push({type:"rest"});
      else if(r<.86)nodes.push({type:"shop"});
      else nodes.push({type:"treasure"});}
    map.push(nodes);
  }
  return map;
}

function SoraAdventure(){
  const gsRef=useRef({
    screen:"title",run:null,battle:null,enemies:[],ti:0,
    meta:Object.assign({totalRuns:0,bestStage:0,clears:0},store.get("sora:meta")||{}),log:[],reward:null,hint:null,suzuMsg:"",mokeMsg:"",roiMsg:"",tut:0,showHelp:false,helpIntro:false,
    skit:null,skitIdx:0,skitEid:null,goTaunt:"",goAdvice:"",
    shopCards:[],shopPotions:[],shopRelic:null,shopScreen:null,restChoice:null,
    pops:[],shakeOn:false,showDeck:false,endIdx:0,_rr:null,
  });
  const[tick,setTick]=useState(0);const gs=gsRef.current;
  const rr=useCallback(()=>setTick(t=>t+1),[]);
  gs._rr=rr;
  const upd=useCallback(fn=>{fn(gsRef.current);store.set("sora:meta",gsRef.current.meta);rr();},[rr]);

  function makeE(eid){const t=EN[eid];if(!t)return null;
    return{id:eid,name:t.name,icon:t.icon,hp:t.hp,maxHp:t.maxHp,shield:0,deckIdx:0,phase:1,poison:0,burn:0,str:0,intent:null,counterStance:0,summoned:t.summoned||false,doom:0,doubleNext:false};}
  function showInt(s,i){const e=s.enemies[i];if(!e||e.hp<=0)return;const t=EN[e.id];if(!t)return;
    const dk=getED(t,e.phase);if(!dk||!dk.length){e.intent=null;return;}
    if(t.shuffleEach)e.intent=t.cards[pick(dk)]||null;else e.intent=t.cards[dk[e.deckIdx%dk.length]]||null;}
  function showAllInt(s){s.enemies.forEach((_,i)=>{if(s.enemies[i].hp>0)showInt(s,i);});}

  function initBattle(s,eid){
    const t=EN[eid];if(!t)return;
    s.screen="battle";
    s.battle={hand:[],drawPile:shuffle(s.run.deck),discardPile:[],energy:s.run.maxEnergy,turn:1,atkN:0,defN:0,eHinted:false};
    s.enemies=[makeE(eid)];s.ti=0;
    s.run.shield=0;s.run.counter=0;s.run.thorns=0;s.run.weakened=0;s.run.energyDebt=0;
    s.log=[`${t.icon} ${t.name} が現れた！`];s.hint=eid==="mimic"?GH.mimic:null;s.roiMsg="";
    if(hasR(s,"mirror")){s.run.shield+=4;}
    draw(s,5+(hasR(s,"tome")?1:0));
    if(s.tut>0){s.tut=0;s.meta.tutDone=true;}
    if(s.meta.totalRuns===1&&!s.meta.tutDone&&!s.meta.tutStarted){
      s.meta.tutStarted=true;s.tut=1;
      const ensure=id=>{if(s.battle.hand.some(c=>c.id===id))return;
        const j=s.battle.drawPile.findIndex(c=>c.id===id);if(j<0)return;
        const k=s.battle.hand.findIndex(c=>c.id!=="slash"&&c.id!=="wall");
        if(k>=0){const tmp=s.battle.hand[k];s.battle.hand[k]=s.battle.drawPile[j];s.battle.drawPile[j]=tmp;}};
      ensure("slash");ensure("wall");
    }
    showAllInt(s);
  }

  const startRun=()=>upd(s=>{
    sfx("click");
    s.screen="map";s.meta.totalRuns++;
    const relics=[];let maxHp=80,maxEnergy=3;
    if(s.meta.totalRuns>1)relics.push(mr("rusty"));
    if(s.meta.clears>0){relics.push(mr("voidheart"));maxHp-=15;maxEnergy+=1;}
    s.run={stage:1,row:0,deck:initDeck(),relics,potions:[mp("healpot")],gold:50,hp:maxHp,maxHp,energy:maxEnergy,maxEnergy,
      str:0,shield:0,poison:0,burn:0,counter:0,thorns:0,weakened:0,energyDebt:0,map:genMap(1)};
    s.enemies=[];s.log=[];s.suzuMsg=suzu("mapStart");s.mokeMsg="";
    if(!s.meta.rulesSeen){s.meta.rulesSeen=true;s.showHelp=true;s.helpIntro=true;}
    if(s.meta.totalRuns>1)s.log=["🗡️ 周回ボーナス:「錆びた剣」を装備して開始！"];
  });

  const selectNode=node=>upd(s=>{
    sfx("click");
    if(node.type==="battle"){initBattle(s,pick(node.enemyPool||["mushroom"]));s.suzuMsg=pick(["がんばって♡","女神が見守ってるわ♡","弱そうね♡ …たぶん♡"]);}
    else if(node.type==="elite"||node.type==="boss"){
      const eid=node.id;const t=EN[eid];if(!t){initBattle(s,eid);return;}
      s.skit=skitLines(t,node.type);s.skitIdx=0;s.skitEid=eid;s.screen="skit";}
    else if(node.type==="rest"){s.restChoice=null;s.screen="rest";s.suzuMsg=suzu("rest");}
    else if(node.type==="shop"){
      const pool=Object.keys(CM).filter(k=>CM[k].r!=="x");
      s.shopCards=shuffle(pool).slice(0,4).map(id=>({card:mc(id),price:CM[id].r==="r"?70:CM[id].r==="u"?50:35}));
      s.shopPotions=shuffle(Object.keys(POTIONS)).slice(0,2).map(id=>({potion:mp(id),price:30}));
      s.shopRelic=Math.random()<.4&&!hasR(s,"firecloak")?{relic:mr("firecloak"),price:120}:null;
      s.shopScreen="buy";s.screen="shop";s.suzuMsg=suzu("shop");}
    else if(node.type==="event"){
      const r=Math.random();
      if(r<.3){s.run.hp=Math.min(s.run.hp+15,s.run.maxHp);s.log=["🏚️ 祠で祈りを捧げた。HP15回復"];}
      else if(r<.55){s.run.gold+=30;s.log=["🐱 ゴミカス「拾い物だ。持ってけ」 +30G"];}
      else if(r<.8){const c=mc(pick(["counter","cleanse","rage","thorns","thunder"]));s.run.deck.push(c);s.log=[`🐱 ゴミカス「いらんから持ってけ」 ${c.name}を入手！`];}
      else{if(s.run.potions.length<3){const p=mp(pick(Object.keys(POTIONS)));s.run.potions.push(p);s.log=[`🔮 魔法の泉で ${p.name} を瓶詰め！`];}else{s.run.gold+=20;s.log=["🔮 泉で20G拾った"];}}
      s.run.row++;s.suzuMsg=suzu("event");}
    else if(node.type==="treasure"){
      const pool=["tome","lifering","mirror","wardcharm","poisonring"].filter(id=>!hasR(s,id));
      if(pool.length){const r=mr(pick(pool));s.run.relics.push(r);s.log=[`📦 宝箱！ ${r.icon}${r.name}(${r.desc})を入手！`];}
      else{s.run.gold+=50;s.log=["📦 宝箱！ +50G"];}
      s.run.row++;s.suzuMsg=suzu("treasure");}
  });

  const advSkit=()=>upd(s=>{if(!s.skit)return;
    sfx("click");
    if(s.skitIdx<s.skit.length-1)s.skitIdx++;
    else{const eid=s.skitEid;s.skit=null;s.skitIdx=0;s.skitEid=null;initBattle(s,eid);}});
  const advTut=()=>upd(s=>{sfx("click");if(s.tut>=TUT.length){s.tut=0;s.meta.tutDone=true;}else s.tut++;});
  const skipSkit=(ev)=>{ev.stopPropagation();upd(s=>{if(!s.skit)return;const eid=s.skitEid;s.skit=null;s.skitIdx=0;s.skitEid=null;initBattle(s,eid);});};

  // ═══ ポーション ═══
  const usePotion=idx=>upd(s=>{
    if(s.screen!=="battle")return;
    const p=s.run.potions[idx];if(!p)return;
    s.run.potions.splice(idx,1);
    if(p.id==="healpot"){s.run.hp=Math.min(s.run.hp+20,s.run.maxHp);addPop(s,"p","+20❤️","#66bb6a");sfx("heal");}
    else if(p.id==="strpot"){s.run.str+=2;addPop(s,"p","💪+2","#ffd54f");sfx("heal");}
    else if(p.id==="purgepot"){s.run.poison=0;s.run.burn=0;s.run.weakened=0;addPop(s,"p","✨浄化","#ba68c8");sfx("heal");}
    s.log.push(`🧪 ${p.name} を使用！`);
  });

  // ═══ カード使用 ═══
  const playCard=idx=>upd(s=>{
    if(s.screen!=="battle"||!s.battle)return;
    const card=s.battle.hand[idx];if(!card||card.type==="curse")return;
    let cost=card.id==="allcut"?s.battle.energy:card.cost;
    if(cost>s.battle.energy||(card.id==="allcut"&&cost===0))return;
    while(s.ti<s.enemies.length&&s.enemies[s.ti].hp<=0)s.ti=(s.ti+1)%s.enemies.length;
    const tgt=s.enemies[s.ti];
    if(tgt?.counterStance>0&&card.type==="attack"){s.hint=GH.counter;s.suzuMsg=suzu("counterTip");}
    s.battle.energy-=cost;s.battle.hand.splice(idx,1);
    if(card.type==="attack")s.battle.atkN=(s.battle.atkN||0)+1;
    if(card.type==="defend")s.battle.defN=(s.battle.defN||0)+1;
    sfx(card.type==="attack"?"atk":card.type==="defend"?"def":"heal");
    if(card.id==="allcut"){const n=s.battle.hand.length+1;dmgE(s,s.ti,n*12);s.battle.discardPile.push(...s.battle.hand.splice(0));}
    else{const f=EFF[card.id];if(f)f(s);}
    if(card.type==="attack"&&tgt&&tgt.hp>0&&tgt.counterStance>0){
      dmgP(s,tgt.counterStance);sfx("hit");
      s.log.push(`🔄💥 ${tgt.name}の反撃発動！ ${tgt.counterStance}ダメージ！`);}
    s.battle.discardPile.push(card);s.log.push(`⚔️ ${card.name} → ${tgt?.name||"?"}`);
    if(!s.hint&&s.run.poison>=5)s.hint=GH.poison;
    if(!s.hint&&s.run.burn>=4)s.hint=GH.burn;
    if(!s.hint&&s.run.hp<=s.run.maxHp*.25&&card.type==="attack")s.hint=GH.lowHp;
    if(s.enemies.every(e=>e.hp<=0))onWin(s);
  });

  // ═══ ターン終了 ═══
  const endTurn=()=>upd(s=>{
    if(s.screen!=="battle"||!s.battle)return;
    sfx("click");
    const _hp0=s.run.hp,_sh0=s.run.shield,_en0=s.battle.energy,_atk=s.battle.atkN||0,_def=s.battle.defN||0;
    s.run.shield=Math.floor(s.run.shield/2);s.run.counter=0;
    for(let i=0;i<s.enemies.length;i++){if(s.enemies[i].hp<=0)continue;enemyAct(s,i);if(s.run.hp<=0){onLose(s);return;}}
    if(s.enemies.every(e=>e.hp<=0)){onWin(s);return;}
    // プレイヤーDOT
    if(s.run.poison>0){s.run.hp-=s.run.poison;addPop(s,"p",`☠️-${s.run.poison}`,"#9ccc65");s.run.poison=Math.max(0,s.run.poison-1);}
    if(s.run.burn>0){const bd=hasR(s,"firecloak")?Math.ceil(s.run.burn/2):s.run.burn;s.run.hp-=bd;addPop(s,"p",`🔥-${bd}`,"#ff8a65");s.run.burn=Math.floor(s.run.burn/2);}
    if(s.run.weakened>0)s.run.weakened--;
    s.battle.hand.forEach(c=>{if(c.id==="pain")s.run.hp-=2;});
    if(s.run.thorns>0)s.run.thorns--;
    if(s.run.hp<=0){onLose(s);return;}
    // 敵DOT
    s.enemies.forEach(e=>{if(e.hp<=0)return;
      if(e.poison>0){e.hp-=e.poison;e.poison=Math.max(0,e.poison-1);}
      if(e.burn>0){e.hp-=e.burn;e.burn=Math.floor(e.burn/2);}});
    if(s.enemies.every(e=>e.hp<=0)){onWin(s);return;}
    // 新ターン
    s.battle.turn++;s.battle.atkN=0;s.battle.defN=0;
    s.battle.energy=Math.max(0,s.run.maxEnergy-(s.run.energyDebt||0));
    if(s.run.energyDebt>0){s.log.push(`⚡ 圧政でエネルギー-${s.run.energyDebt}...`);s.run.energyDebt=0;}
    if(hasR(s,"hourglass")&&s.battle.turn%3===0){s.battle.energy+=1;s.log.push("⏳ 砂時計: エネルギー+1");}
    s.battle.discardPile.push(...s.battle.hand.splice(0));
    s.enemies.forEach(e=>{if(e.hp>0){if(!EN[e.id]?.keepShield)e.shield=0;e.counterStance=0;}});
    if(hasR(s,"mirror"))s.run.shield+=4;
    // Phase移行
    s.enemies.forEach(e=>{if(e.hp<=0)return;const t=EN[e.id];
      if(!t?.boss)return;
      if(t.final){
        if(e.phase===1&&e.hp<=e.maxHp*.6){e.phase=2;e.deckIdx=0;e.str+=2;s.log.push(`⚠️ ${e.name}「${t.phase2lines[0]}」`);s.hint=GH.phase;sfx("phase");}
        else if(e.phase===2&&e.hp<=e.maxHp*.25){e.phase=3;e.deckIdx=0;s.log.push(`💀 ${e.name}「${t.phase3lines[0]}」`);s.hint=GH.doom;sfx("doom");}
      }else if(e.phase===1&&e.hp<=e.maxHp*.5){e.phase=2;e.deckIdx=0;e.str+=3;s.log.push(`⚠️ ${e.name}「${t.phase2lines?.[0]||"..."}」`);s.hint=GH.phase;sfx("phase");}
    });
    // てんぷらP2灼熱フィールド
    s.enemies.forEach(e=>{if(e.hp>0&&e.id==="tempura"&&e.phase===2){dmgP(s,10);s.log.push("🔥 灼熱フィールド！ 10ダメージ！");}});
    if(s.run.hp<=0){onLose(s);return;}
    draw(s,5+(hasR(s,"tome")?1:0));
    if(s.hint!==GH.phase&&s.hint!==GH.doom)s.hint=null;
    if(s.enemies[s.ti]?.hp<=0){const a=s.enemies.findIndex(e=>e.hp>0);if(a>=0)s.ti=a;}
    showAllInt(s);
    // ろいのダメ出し / すず
    const _lost=_hp0-s.run.hp;
    if(s.enemies.some(e=>e.id==="roi"&&e.hp>0)){
      if(_lost>=15&&_sh0===0)s.roiMsg=`ろい「ノーガードで${_lost}点！？ 見てるこっちが痛いんだけど！」`;
      else if(_atk>=3&&_def===0&&_lost>0)s.roiMsg="ろい「脳筋すぎ！ 防御カードって知ってる？」";
      else if(_en0>=2)s.roiMsg="ろい「⚡余らせてターン終了？ 豪気だね〜」";
      else if(Math.random()<.2)s.roiMsg=pick(ROI_BATTLE);
      else s.roiMsg="";
    }else{
      s.roiMsg="";
      if(_lost>=15&&_sh0===0&&!s.hint)s.hint=`ノーガードで${_lost}点もらったな。シールド張れ`;
      else if(_en0>=2&&!s.battle.eHinted&&!s.hint){s.hint="エネルギー余ってたぞ。使い切ってから終われ";s.battle.eHinted=true;}
    }
    if(Math.random()<.2)s.suzuMsg=suzu("battleHint");
    // シェイクリセット
    setTimeout(()=>{gsRef.current.shakeOn=false;rr();},400);
  });

  function enemyAct(s,i){
    const e=s.enemies[i];const t=EN[e.id];if(!t)return;
    // 終焉タイマー
    if(e.doom>0){
      e.doom--;
      if(e.doom===0){s.log.push("💀💀💀 終焉！！！");dmgP(s,999);sfx("doom");return;}
      s.log.push(`⏳ 終焉まであと${e.doom}ターン！！`);
    }
    const dk=getED(t,e.phase);if(!dk||!dk.length)return;
    let cardId;if(t.shuffleEach)cardId=pick(dk);else cardId=dk[e.deckIdx%dk.length];
    const card=t.cards[cardId];e.deckIdx++;if(!card)return;
    s.log.push(`${e.icon} ${card.name}！`);
    if(card.nothing)return void showInt(s,i);
    if(card.dmg){
      let d=card.dmg+(e.str||0);
      const hits=card.hits||1;
      if(e.doubleNext){d*=2;e.doubleNext=false;s.log.push("💥 処刑執行！ ダメージ2倍！");}
      for(let h=0;h<hits;h++){dmgP(s,d);sfx("hit");}
      if(s.run.counter>0){if(e.shield>=s.run.counter)e.shield-=s.run.counter;else{e.hp-=s.run.counter-e.shield;e.shield=0;}
        addPop(s,i,`-${s.run.counter}`,"#4fc3f7");s.log.push(`🔄✨ カウンター発動！ ${s.run.counter}反撃！`);}
      if(s.run.thorns>0){e.hp-=s.run.thorns;addPop(s,i,`-${s.run.thorns}`,"#4fc3f7");}
    }
    if(card.shield)e.shield+=card.shield;
    if(card.counter){e.counterStance=card.counter;s.log.push(`🔄 ${e.name}が構えた！ 攻撃すると${card.counter}反撃！`);}
    else if(!card.counter)e.counterStance=0;
    if(card.heal){e.hp=Math.min(e.hp+card.heal,e.maxHp);addPop(s,i,`+${card.heal}`,"#66bb6a");}
    if(card.poison)s.run.poison+=card.poison;
    if(card.burn)s.run.burn+=card.burn;
    if(card.weaken){s.run.weakened+=card.weaken;s.log.push(`💔 弱体化 ${card.weaken}T！`);}
    if(card.selfStr){e.str+=card.selfStr;s.log.push(`💪 ${e.name}の筋力+${card.selfStr}！`);if(card.selfStr>=3&&!s.hint)s.hint=GH.charge;}
    if(card.selfDmg)e.hp-=card.selfDmg;
    if(card.selfBurn)e.burn=(e.burn||0)+card.selfBurn;
    if(card.doubleNext){e.doubleNext=true;s.hint=GH.double;s.log.push(`⚠️ ${e.name}の次の攻撃はダメージ2倍！`);}
    if(card.doom){e.doom=card.doom+1;s.hint=GH.doom;s.log.push(`💀 終焉宣告！！ ${card.doom}ターン後に999ダメージ！！`);sfx("doom");}
    if(card.stealGold){const st=Math.min(s.run.gold,card.stealGold);s.run.gold-=st;e.stolen=(e.stolen||0)+st;s.log.push(`💰 ${st}G奪われた！（倒せば取り返せる）`);}
    if(card.curse){
      if(hasR(s,"wardcharm")&&Math.random()<.5){s.log.push("🧿 護符が呪いを弾いた！");}
      else{const c=mc(card.curse);if(c){s.battle.discardPile.push(c);s.log.push(`💀 呪い「${c.name}」が混入！`);}}}
    if(card.convertPoison&&s.run.poison>0){const cv=s.run.poison*card.convertPoison;s.log.push(`☠️ 毒変換！ ${cv}dmg！`);dmgP(s,cv);sfx("hit");s.run.poison=0;}
    if(card.summon&&s.enemies.length<3){const ne=makeE(card.summon);if(ne){s.enemies.push(ne);s.log.push(`${ne.icon} ${ne.name} が現れた！`);showInt(s,s.enemies.length-1);if(!s.hint)s.hint=GH.multi;}}
    if(card.shieldBash){const bd=Math.floor(e.shield*.5);if(bd>0){dmgP(s,bd);sfx("hit");s.log.push(`🛡️💥 シールドバッシュ ${bd}ダメージ！`);}}
    if(card.energyDrain)s.run.energyDebt=(s.run.energyDebt||0)+card.energyDrain;
    showInt(s,i);
  }

  function onWin(s){
    sfx("win");
    if(hasR(s,"lifering")){s.run.hp=Math.min(s.run.hp+5,s.run.maxHp);}
    const beatRoi=s.enemies.some(e=>e.id==="roi");
    if(beatRoi){s.meta.clears++;s.meta.bestStage=3;s.screen="ending";s.endIdx=0;return;}
    s.log.push("🎉 勝利！");s.suzuMsg=suzu("bossWin");
    const isBoss=s.enemies.some(e=>EN[e.id]?.boss);const isElite=s.enemies.some(e=>EN[e.id]?.elite);
    let gold=isBoss?100:isElite?50:25;
    const _stolen=s.enemies.reduce((a,e)=>a+(e.stolen||0),0);
    if(_stolen>0){gold+=_stolen+10;s.log.push(`💰 奪われた${_stolen}Gと慰謝料10Gを回収！`);}
    s.run.gold+=gold;
    let relicDrop=null;
    if(isBoss){const map={momo:"ragemask",tempura:"hourglass"};const beaten=s.enemies.find(e=>EN[e.id]?.boss);const rid=map[beaten?.id];if(rid&&!hasR(s,rid))relicDrop=mr(rid);}
    else if(isElite&&Math.random()<.5&&!hasR(s,"poisonring"))relicDrop=mr("poisonring");
    if(relicDrop){s.run.relics.push(relicDrop);}
    if(isBoss&&s.run.potions.length<3)s.run.potions.push(mp(pick(Object.keys(POTIONS))));
    s.reward={cards:rollReward(),gold,isBoss,relicDrop};s.screen="reward";
  }
  function onLose(s){sfx("lose");s.screen="gameOver";s.meta.bestStage=Math.max(s.meta.bestStage,s.run?.stage||1);s.goTaunt=pick(RT);s.goAdvice=pick(GD);}

  const pickReward=card=>upd(s=>{
    sfx("click");
    if(card)s.run.deck.push(card);
    const wasBoss=s.reward?.isBoss;s.reward=null;
    if(wasBoss&&s.run.stage<3){
      s.run.stage++;s.run.row=0;s.run.map=genMap(s.run.stage);
      s.suzuMsg=suzu("stageUp");s.mokeMsg=s.run.stage===2?MOKE.stage2:MOKE.stage3;
      s.log=[`🎉 ステージ${s.run.stage}「${SN[s.run.stage]}」へ！`];
    }else{s.run.row++;s.mokeMsg="";}
    s.screen="map";s.hint=null;
  });

  const buyCard=idx=>upd(s=>{const it=s.shopCards[idx];if(!it||s.run.gold<it.price)return;sfx("click");
    s.run.gold-=it.price;s.run.deck.push(it.card);s.shopCards.splice(idx,1);s.log=[`🛡️ ${it.card.name} を購入！`];});
  const buyPotion=idx=>upd(s=>{const it=s.shopPotions[idx];if(!it||s.run.gold<it.price||s.run.potions.length>=3)return;sfx("click");
    s.run.gold-=it.price;s.run.potions.push(it.potion);s.shopPotions.splice(idx,1);s.log=[`🧪 ${it.potion.name} を購入！`];});
  const buyRelic=()=>upd(s=>{const it=s.shopRelic;if(!it||s.run.gold<it.price)return;sfx("click");
    s.run.gold-=it.price;s.run.relics.push(it.relic);s.shopRelic=null;s.log=[`🧥 ${it.relic.name} を購入！`];});
  const removeCard=idx=>upd(s=>{const fee=s.run.stage===1?30:50;if(s.run.gold<fee||s.run.deck.length<=5)return;sfx("click");
    s.run.gold-=fee;const rm=s.run.deck.splice(idx,1)[0];s.log=[`🗑️ ${rm.name} を削除！(-${fee}G)`];});
  const restHeal=()=>upd(s=>{sfx("heal");const a=Math.floor(s.run.maxHp*.35);s.run.hp=Math.min(s.run.hp+a,s.run.maxHp);
    s.log=[`😴 HP ${a} 回復！`];s.run.row++;s.screen="map";s.suzuMsg=suzu("mapMove");});
  const restEnhance=idx=>upd(s=>{const c=s.run.deck[idx];if(!c)return;sfx("heal");
    if(enhance(c))s.log=[`✨ ${c.name}に強化！`];else s.log=["😴 にーや「もう強い...zzz」"];
    s.run.row++;s.screen="map";s.suzuMsg=suzu("mapMove");});

  // ═══ 共通UI ═══
  const st={
    wrap:{width:"100%",maxWidth:480,margin:"0 auto",minHeight:"100dvh",background:P.bg,color:P.text,fontFamily:"'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif",userSelect:"none",WebkitUserSelect:"none"},
    btn:(bg=P.accent)=>({padding:"12px 24px",background:bg,color:"#fff",border:"none",borderRadius:8,fontSize:16,fontWeight:700,cursor:"pointer",touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}),
    card:(ok,color)=>({minWidth:74,maxWidth:84,flexShrink:0,background:ok?P.cardBg:"#111",
      border:`2px solid ${ok?color||"#333":"#333"}`,borderRadius:10,padding:6,
      display:"flex",flexDirection:"column",alignItems:"center",gap:3,
      cursor:ok?"pointer":"not-allowed",opacity:ok?1:.5,touchAction:"manipulation",
      boxShadow:ok?`0 0 8px ${color}44`:"none"}),
    suzuBox:{background:"rgba(233,69,96,0.06)",borderRadius:8,padding:8,fontSize:12,borderLeft:"3px solid #e94560"},
  };
  const rarityBadge=r=>r==="r"?"🟡":r==="u"?"🔵":"⚪";

  const DeckModal=()=>gs.showDeck?(
    <div className="fadein" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:50,display:"flex",flexDirection:"column",padding:16,maxWidth:480,margin:"0 auto"}}
      onClick={()=>upd(s=>{s.showDeck=false;})}>
      <div style={{fontSize:15,fontWeight:700,marginBottom:10,color:"#fff"}}>🃏 デッキ ({gs.run?.deck.length}枚) — タップで閉じる</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",overflowY:"auto"}}>
        {gs.run?.deck.map(c=>(<div key={c.uid} style={{background:P.cardBg,border:`1px solid ${c.color}`,borderRadius:8,padding:6,minWidth:64,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <div style={{fontSize:15}}>{c.icon}</div><div style={{fontSize:9,color:c.color,fontWeight:700}}>{c.name}</div><div style={{fontSize:8,color:P.dim}}>{c.desc}</div>
        </div>))}
      </div>
      {gs.run?.relics.length>0&&<><div style={{fontSize:13,fontWeight:700,margin:"12px 0 6px",color:"#fff"}}>🏺 レリック</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {gs.run.relics.map((r,i)=>(<div key={i} style={{background:"#1a1a2e",border:"1px solid #f5c518",borderRadius:8,padding:6,fontSize:10}}>{r.icon} {r.name}<div style={{fontSize:8,color:P.dim}}>{r.desc}</div></div>))}
      </div></>}
    </div>):null;

  const HelpModal=()=>gs.showHelp?(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:20,padding:16,overflowY:"auto"}} onClick={()=>upd(s=>{s.showHelp=false;s.helpIntro=false;})}>
      <div style={{maxWidth:420,margin:"0 auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:16,fontWeight:900}}>❓ あそびかた</div>
          <button onClick={()=>upd(s=>{s.showHelp=false;s.helpIntro=false;})} style={{background:"#333",color:"#ccc",border:"none",borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>閉じる ✕</button>
        </div>
        {gs.helpIntro?<div style={{background:"rgba(233,69,96,0.12)",border:"1px solid #e94560",borderRadius:8,padding:8,fontSize:12,marginBottom:10}}>🐑 すず「はじめての冒険ね♡ 最初にルールだけ簡単に説明するわ。読んだら閉じてマップへ！ ❓ボタンでいつでも見返せるからね」</div>:<div style={{fontSize:12,color:P.dim,marginBottom:10}}>💤 もけもけ：「説明するのめんどいけど...まあ読んでいって」</div>}
        <div style={{background:"rgba(255,255,255,0.05)",borderRadius:10,padding:12,fontSize:13,lineHeight:1.8,marginBottom:12}}>
          ① 手札のカードをタップして、敵を攻撃したりシールドで守ったりする<br/>

        </div>
        <div style={{fontSize:14,fontWeight:700,marginBottom:6}}>📖 用語集</div>
        {[["⚡ エネルギー","カードを使うための力。毎ターン全回復する"],
          ["🛡️ シールド","ダメージを肩代わりする。自分のシールドは次のターンに半減、敵のは毎ターン消える"],
          ["☠️ 毒","ターン終了時に数値分のダメージを受け、その後1減る"],
          ["🔥 炎上","ターン終了時に数値分ダメージ。その後半減して消える（重ねられると初撃が痛い）"],
          ["💪 筋力","攻撃のダメージが数値分増える（敵が持つと敵の攻撃も痛くなる）"],
          ["🔄 構え（反撃）","構え中の敵を攻撃すると反撃ダメージを受ける。そのターンは攻撃を控えるのが吉"],
          ["💔 弱体","攻撃ダメージが25%減る状態。ターン経過か「浄化」で解除"],
          ["💀 呪いカード","使えないカードが手札を圧迫する。「浄化」やショップの削除で対処"],
          ["🔮 行動予告（インテント）","敵が次のターンにすること。数値は受ける予定のダメージ"]
        ].map(([k,v],i)=>(<div key={i} style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:8,marginBottom:5,fontSize:12}}><span style={{fontWeight:700}}>{k}</span><div style={{color:"#aaa",marginTop:2,fontSize:11,lineHeight:1.5}}>{v}</div></div>))}
      </div>
    </div>):null;

  const Pops=({target})=>(<>{gs.pops.filter(p=>p.target===target).map((p,i)=>(
    <div key={p.id} className="pop" style={{color:p.color,right:8+i*22,top:4}}>{p.txt}</div>))}</>);

  // ══ TITLE ══
  if(gs.screen==="title")return(
    <div style={st.wrap}><style>{CSS}</style><HelpModal/>
      <div className="fadein" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100dvh",gap:22,padding:20}}>
        <div style={{fontSize:13,color:P.dim,letterSpacing:2}}>ローグライト・デッキ構築カードバトル</div>
        <div style={{fontSize:38,fontWeight:900,background:`linear-gradient(135deg,${P.accent},${P.gold})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",textAlign:"center"}}>ソラの大冒険</div>
        <div style={{fontSize:48}}>🤓⚔️👿</div>
        <div style={{color:P.dim,textAlign:"center",fontSize:13,lineHeight:1.8,maxWidth:300}}>💤 もけもけ：「やあ。僕はもけもけ。この冒険の語り部...というか、見てるだけの人」</div>
        <button style={st.btn()} onClick={startRun}>冒険を始める</button>
        <button style={{...st.btn(P.accent2),fontSize:13,padding:"8px 24px"}} onClick={()=>upd(s=>{s.showHelp=true;})}>❓ あそびかた</button>
        <div style={{color:P.dim,fontSize:10}}>📱 周回記録はこの端末に自動保存されます</div>
        <div style={{color:P.dim,fontSize:11}}>通算{gs.meta.totalRuns}周 | 最高: ステージ{gs.meta.bestStage||"—"} | クリア{gs.meta.clears}回</div>
        {gs.meta.totalRuns>0&&gs.meta.clears===0&&<div style={{fontSize:11,color:P.gold}}>🗡️ 2周目以降:「錆びた剣」でスタート</div>}
        {gs.meta.clears>0&&<div style={{fontSize:11,color:P.gold}}>🖤 クリア特典:「虚無の心臓」装備</div>}

  // ══ SKIT ══

  // ══ SHOP ══

  // ══ REST ══

  // ══ BATTLE ══
  if(gs.screen==="battle"&&gs.battle){

                {e.intent.counter?<span style={{color:"#ff9800"}}>{` ⚡反撃${e.intent.counter}`}</span>:""}

              </div>
              {(run.poison>0||run.burn>0)&&<div style={{fontSize:9,color:"#ff9800",marginTop:2}}>{run.poison>0?`☠️毒${run.poison} `:""}{run.burn>0?`🔥炎上${run.burn}`:""}</div>}

  // ══ REWARD ══

        <div style={{fontSize:14,color:P.gold}}>+{gs.reward.gold}G</div>
        {gs.reward.relicDrop&&<div style={{background:"rgba(245,197,24,0.1)",border:"1px solid #f5c518",borderRadius:10,padding:10,fontSize:13}}>
          🏺 レリック入手: {gs.reward.relicDrop.icon}{gs.reward.relicDrop.name}<div style={{fontSize:10,color:P.dim}}>{gs.reward.relicDrop.desc}</div></div>}
        <div style={{...st.suzuBox,maxWidth:300}}>🐑 すず「{gs.suzuMsg}」</div>
        <div style={{fontSize:14}}>報酬: 好きなカードを1枚選んでデッキに追加</div>
        <div style={{fontSize:11,color:P.dim,maxWidth:300,textAlign:"center",lineHeight:1.6}}>デッキが増えると強いカードを引きにくくなることも。いらなければ「スキップ」でOK</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center"}}>
          {gs.reward.cards.map((card,i)=>(
            <button key={i} onClick={()=>pickReward(card)}
              style={{width:100,background:P.cardBg,border:`2px solid ${card.color}`,borderRadius:12,padding:12,
                display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",touchAction:"manipulation"}}>
              <div style={{fontSize:9}}>{rarityBadge(card.r)}</div>
              <div style={{fontSize:28}}>{card.icon}</div>
              <div style={{fontSize:12,fontWeight:700,color:card.color}}>{card.name}</div>
              <div style={{fontSize:9,color:P.dim}}>{card.desc}</div>
              <div style={{fontSize:10,color:P.gold}}>⚡{card.cost}</div>
            </button>))}
        </div>
        <button onClick={()=>pickReward(null)} style={st.btn("#555")}>スキップ</button>
        {gs.reward.isBoss&&gs.run.stage<3&&<div style={{fontSize:12,color:P.gold}}>🏰 次のステージへ進みます</div>}
      </div></div>);

  // ══ ENDING ══
  if(gs.screen==="ending"){
    const lines=[
      {ch:"👿",nm:"ろい",tx:"うそ...このわたしが...抽選勇者ごときに..."},
      {ch:"👿",nm:"ろい",tx:"...まあいっか♪ 税率は50%に下げとくね。じゃーね♡"},
      {ch:"🤓",nm:"ソラ",tx:"まだ50%あるんですけど..."},
      {ch:"🐑",nm:"すず",tx:"やったわソラ！ 女神の導きの勝利よ♡ 記念にわたしを崇めていいわ♡"},
      {ch:"💤",nm:"もけもけ",tx:"こうして、世界はそこそこ平和になった。...税率まだ高いけどね"},
      {ch:"💤",nm:"もけもけ",tx:"ソラの大冒険、これにて完結。...2周目？ あるらしいよ。僕は寝るけど"},
    ];
    const line=lines[Math.min(gs.endIdx,lines.length-1)];
    const last=gs.endIdx>=lines.length-1;
    return(<div style={st.wrap} onClick={()=>!last&&upd(s=>{s.endIdx++;})}><style>{CSS}</style>
      <div className="fadein" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100dvh",padding:20,gap:18}}>
        <div style={{fontSize:26,fontWeight:900,background:`linear-gradient(135deg,${P.gold},#fff)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🎊 GAME CLEAR 🎊</div>
        <div style={{fontSize:56}}>👑🤓👑</div>
        <div key={gs.endIdx} className="fadein" style={{background:P.panelBg,border:`1px solid ${P.gold}`,borderRadius:12,padding:16,maxWidth:340,width:"100%",minHeight:90}}>
          <div style={{display:"flex",gap:10}}>
            <div style={{fontSize:28}}>{line.ch}</div>
            <div><div style={{fontSize:11,color:P.gold,marginBottom:4}}>{line.nm}</div><div style={{fontSize:14,lineHeight:1.7}}>{line.tx}</div></div>
          </div>
          {!last&&<div style={{textAlign:"right",fontSize:10,color:P.dim,marginTop:6}}>タップで次へ ▶</div>}
        </div>
        {last&&<>
          <div style={{fontSize:12,color:P.dim}}>周回: {gs.meta.totalRuns}回目でクリア | 通算クリア{gs.meta.clears}回</div>
          <div style={{fontSize:12,color:P.gold}}>🖤 次周から「虚無の心臓」(最大HP-15/エネ+1)装備！</div>
          <button style={st.btn()} onClick={startRun}>🔄 2周目へ</button>
          <button style={st.btn("#333")} onClick={()=>upd(s=>{s.screen="title";})}>🏠 タイトル</button>
        </>}
      </div></div>);
  }

  // ══ GAMEOVER ══
  if(gs.screen==="gameOver")return(
    <div style={st.wrap}><style>{CSS}</style>
      <div className="fadein" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100dvh",padding:20,gap:16}}>
        <div style={{fontSize:28,fontWeight:900,color:P.accent}}>GAME OVER</div>
        <div style={{background:"rgba(255,255,255,0.05)",borderRadius:12,padding:16,maxWidth:340,width:"100%"}}>
          <div style={{fontSize:14,marginBottom:12}}>👿 ろい「{gs.goTaunt}」</div>
          <div style={{fontSize:13,marginBottom:12,color:P.gold}}>🐱 ゴミカス：「{gs.goAdvice}」</div>
          <div style={{fontSize:12,color:P.dim}}>💤 もけもけ：「...次がんばれ」</div>
        </div>
        <div style={{fontSize:12,color:P.dim}}>到達: ステージ{gs.run?.stage||1} | 周回: {gs.meta.totalRuns}回目</div>
        <button style={st.btn()} onClick={startRun}>🔄 もう1回</button>
        <button style={st.btn("#333")} onClick={()=>upd(s=>{s.screen="title";})}>🏠 タイトル</button>
      </div></div>);

  return <div style={st.wrap}><div style={{padding:20,color:P.dim}}>Loading...</div></div>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SoraAdventure />);
</script>
</body>
</html>
